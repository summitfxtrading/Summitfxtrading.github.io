<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Withdraw - SummitFX</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<style>
body {
    margin:0;
    font-family: Arial;
    background: linear-gradient(180deg,#0b1220,#05080f);
    color:white;
}

.card {
    margin:20px;
    padding:20px;
    background: rgba(255,255,255,0.05);
    border-radius:15px;
}

select, input {
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    background:#111827;
    color:white;
}

.btn {
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:linear-gradient(45deg,#00ffcc,#0099ff);
    color:black;
    font-weight:bold;
    margin-top:10px;
    cursor:pointer;
}

.status {
    margin-top:15px;
    text-align:center;
    font-weight:bold;
    color:orange;
}
</style>

</head>

<body>

<div class="card">

    <h2>Withdraw Funds</h2>

    <!-- TYPE -->
    <label>Select Currency</label>
    <select id="currency" onchange="showFields()">
        <option value="">-- Select --</option>
        <option value="btc">Bitcoin (BTC)</option>
        <option value="usdt">USDT</option>
    </select>

    <!-- USDT NETWORK -->
    <div id="usdtOptions" style="display:none;">
        <label>Select USDT Network</label>
        <select id="network">
            <option value="">-- Select Network --</option>
            <option value="TRC20">TRC20 (Tron)</option>
            <option value="ERC20">ERC20 (Ethereum)</option>
            <option value="BEP20">BEP20 (Binance Smart Chain)</option>
        </select>
    </div>

    <!-- ADDRESS -->
    <label>Wallet Address</label>
    <input type="text" id="address" placeholder="Enter wallet address">

    <!-- AMOUNT -->
    <label>Amount (USD)</label>
    <input type="number" id="amount" placeholder="Enter amount">

    <button class="btn" onclick="submitWithdrawal()">Withdraw</button>

    <div class="status" id="status"></div>

</div>

<script>

// FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyAT-Yr_wusE2KKW7YpEfQpQMeJYe2WqWW0",
  authDomain: "summitfx-trading.firebaseapp.com",
  projectId: "summitfx-trading",
  storageBucket: "summitfx-trading.appspot.com",
  messagingSenderId: "838670474162",
  appId: "1:838670474162:web:b3d9eac185a7932a20a2ab"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

// AUTH CHECK
firebase.auth().onAuthStateChanged(user=>{
    if(!user){
        window.location = "login.html";
    }
});

// SHOW FIELDS BASED ON SELECTION
function showFields(){
    let currency = document.getElementById("currency").value;

    document.getElementById("usdtOptions").style.display =
        currency === "usdt" ? "block" : "none";
}

// SUBMIT WITHDRAWAL
function submitWithdrawal(){

    let user = firebase.auth().currentUser;

    let currency = document.getElementById("currency").value;
    let network = document.getElementById("network").value;
    let address = document.getElementById("address").value;
    let amount = document.getElementById("amount").value;

    if(!currency || !address || !amount){
        alert("Please fill all required fields");
        return;
    }

    if(currency === "usdt" && !network){
        alert("Please select USDT network");
        return;
    }

    document.getElementById("status").innerText = "Processing...";

    db.collection("withdrawals").add({
        userId: user.uid,
        currency: currency,
        network: network || null,
        address: address,
        amount: amount,
        status: "pending",
        createdAt: Date.now()
    })
    .then(()=>{
        document.getElementById("status").innerText =
        "Withdrawal request submitted. Please wait...";

        alert("Withdrawal submitted successfully!");
    })
    .catch(err=>{
        document.getElementById("status").innerText = "";
        alert(err.message);
    });
}

</script>

</body>
</html>
