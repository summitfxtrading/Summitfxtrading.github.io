<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KYC Verification - SummitFX</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>

<style>
body {
    margin:0;
    font-family: Arial;
    background: linear-gradient(180deg,#0b1220,#05080f);
    color:white;
}

.header {
    padding:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.title {
    font-size:20px;
    font-weight:bold;
    background: linear-gradient(45deg,#00ffcc,#00aaff);
    -webkit-background-clip:text;
    color:transparent;
}

.card {
    margin:20px;
    padding:20px;
    background: rgba(255,255,255,0.05);
    border-radius:15px;
    border:1px solid rgba(255,255,255,0.08);
}

select, input {
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    background:#111827;
    color:white;
}

.btn {
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:linear-gradient(45deg,#00ffcc,#0099ff);
    color:black;
    font-weight:bold;
    margin-top:10px;
    cursor:pointer;
}

.status {
    margin-top:15px;
    text-align:center;
    font-weight:bold;
}

.waiting {
    color: orange;
}
</style>

</head>

<body>

<div class="header">
    <div class="title">KYC Verification</div>
    <button onclick="goBack()" style="background:none;border:none;color:white;">⬅ Back</button>
</div>

<div class="card">

    <label>Select Document Type</label>
    <select id="docType" onchange="toggleUpload()">
        <option value="">-- Select --</option>
        <option value="id">National ID</option>
        <option value="passport">Passport</option>
    </select>

    <div id="uploadBox" style="display:none;">

        <label>Front Image</label>
        <input type="file" id="frontFile" accept="image/*" capture="environment">

        <label>Back Image</label>
        <input type="file" id="backFile" accept="image/*" capture="environment">

        <button class="btn" onclick="submitKYC()">Submit KYC</button>

    </div>

    <div class="status" id="statusText"></div>

</div>

<script>

// FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyAT-Yr_wusE2KKW7YpEfQpQMeJYe2WqWW0",
  authDomain: "summitfx-trading.firebaseapp.com",
  projectId: "summitfx-trading",
  storageBucket: "summitfx-trading.appspot.com",
  messagingSenderId: "838670474162",
  appId: "1:838670474162:web:b3d9eac185a7932a20a2ab"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const storage = firebase.storage();

// AUTH CHECK
firebase.auth().onAuthStateChanged(user=>{
    if(!user){
        window.location = "login.html";
    } else {
        checkStatus(user.uid);
    }
});

// SHOW UPLOAD SECTION
function toggleUpload(){
    let val = document.getElementById("docType").value;
    document.getElementById("uploadBox").style.display = val ? "block" : "none";
}

// CHECK STATUS
function checkStatus(uid){
    db.collection("kyc").doc(uid).get().then(doc=>{
        if(doc.exists){
            document.getElementById("statusText").innerHTML =
            "<span class='waiting'>Status: Waiting for verification...</span>";
        }
    });
}

// SUBMIT KYC (FIXED)
async function submitKYC(){

    let user = firebase.auth().currentUser;
    let type = document.getElementById("docType").value;
    let front = document.getElementById("frontFile").files[0];
    let back = document.getElementById("backFile").files[0];

    if(!type || !front || !back){
        alert("Please fill all fields");
        return;
    }

    try {

        let frontRef = storage.ref(`kyc/${user.uid}/front_${Date.now()}`);
        let backRef = storage.ref(`kyc/${user.uid}/back_${Date.now()}`);

        // Upload both files
        await frontRef.put(front);
        await backRef.put(back);

        // Get URLs
        let frontURL = await frontRef.getDownloadURL();
        let backURL = await backRef.getDownloadURL();

        // Save to Firestore
        await db.collection("kyc").doc(user.uid).set({
            type: type,
            frontUrl: frontURL,
            backUrl: backURL,
            status: "pending",
            createdAt: Date.now()
        });

        document.getElementById("statusText").innerHTML =
        "<span class='waiting'>KYC Submitted. Waiting for verification...</span>";

        alert("KYC submitted successfully!");

    } catch (error) {
        console.error(error);
        alert("Upload failed: " + error.message);
    }
}

// BACK
function goBack(){
    window.location = "dashboard.html";
}

</script>

</body>
    </html>
