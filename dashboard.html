<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<style>
body {margin:0;background:#0b1220;color:white;font-family:Arial;}

.header {
display:flex;
justify-content:space-between;
padding:15px;
background:#111a2e;
}

.ticker {
background:#1a2333;
padding:10px;
overflow:hidden;
white-space:nowrap;
}

.ticker span {
display:inline-block;
animation:scroll 12s linear infinite;
}

@keyframes scroll {
0%{transform:translateX(100%)}
100%{transform:translateX(-100%)}
}

.card {
background:#1a2333;
margin:15px;
padding:20px;
border-radius:12px;
}

.menu {
position:fixed;
bottom:0;
width:100%;
display:flex;
justify-content:space-around;
background:#111a2e;
padding:10px;
}
</style>
</head>

<body>

<div class="header">
<div>SummitFX</div>
<div onclick="logout()">Logout</div>
</div>

<div class="ticker"><span id="prices">Loading...</span></div>

<div class="card">
<h3>Balance</h3>
<h1 id="balance">$0</h1>
</div>

<div class="card">
<h3>Deposit</h3>
<input value="TLEMJfnDaAqSoGWTG19WRMp2nco3qM6kDW" id="addr" readonly>
<button onclick="copy()">Copy</button>
</div>

<div class="menu">
<div>🏠</div>
<div>📈</div>
<div>💰</div>
<div>💸</div>
</div>

<script>
const firebaseConfig = {
apiKey:"AIzaSyAT-Yr_wusE2KKW7YpEfQpQMeJYe2WqWW0",
authDomain:"summitfx-trading.firebaseapp.com",
projectId:"summitfx-trading",
appId:"1:838670474162:web:b3d9eac185a7932a20a2ab"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

firebase.auth().onAuthStateChanged(user=>{
if(user){
db.collection("users").doc(user.uid).get().then(doc=>{
if(doc.exists){
balance.innerText="$"+doc.data().balance;
}
});
}else{
window.location="login.html";
}
});

function logout(){
firebase.auth().signOut().then(()=>window.location="login.html");
}

function copy(){
navigator.clipboard.writeText(addr.value);
alert("Copied");
}

// LIVE PRICES
async function prices(){
let r=await fetch("https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,tether&vs_currencies=usd");
let d=await r.json();

document.getElementById("prices").innerHTML=
`BTC $${d.bitcoin.usd} | ETH $${d.ethereum.usd} | USDT $${d.tether.usd}`;
}
prices();
setInterval(prices,10000);
</script>

</body>
    </html>
