
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<style>
body {
    background:#0b1220;
    color:white;
    font-family:Arial;
    text-align:center;
}

.card {
    background:#1a2333;
    margin:15px;
    padding:20px;
    border-radius:12px;
}

button {
    padding:12px;
    margin:5px;
    cursor:pointer;
}

input {
    padding:10px;
    width:90%;
    margin-top:10px;
}
</style>

</head>

<body>

<h1>SummitFX Dashboard</h1>

<p id="userEmail"></p>

<div class="card">
<h2>Your Balance</h2>
<h1 id="balance">$0</h1>
</div>

<!-- INVESTMENT PLANS -->
<div class="card">
<h2>Investment Plans</h2>

<button onclick="selectPlan(400,8000)">$400 → $8000</button>
<button onclick="selectPlan(500,10000)">$500 → $10000</button>
<button onclick="selectPlan(600,12000)">$600 → $12000</button>
<button onclick="selectPlan(700,14000)">$700 → $14000</button>
<button onclick="selectPlan(800,16000)">$800 → $16000</button>

</div>

<!-- DEPOSIT SECTION -->
<div class="card">
<h2>Deposit USDT (TRC20)</h2>

<p>Send USDT to the address below:</p>

<input id="usdtAddress" value="TLEMJfnDaAqSoGWTG19WRMp2nco3qM6kDW" readonly>

<br><br>

<button onclick="copyAddress()">Copy Address</button>

<p>After sending, wait for confirmation.</p>

<p id="planInfo"></p>

</div>

<button onclick="logout()">Logout</button>

<script>

// ✅ YOUR REAL FIREBASE CONFIG (FIXED)
const firebaseConfig = {
  apiKey: "AIzaSyAT-Yr_wusE2KKW7YpEfQpQMeJYe2WqWW0",
  authDomain: "summitfx-trading.firebaseapp.com",
  projectId: "summitfx-trading",
  storageBucket: "summitfx-trading.firebasestorage.app",
  messagingSenderId: "838670474162",
  appId: "1:838670474162:web:b3d9eac185a7932a20a2ab",
  measurementId: "G-HKLYNSZFT1"
};

// Initialize Firebase
firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

// ✅ CORRECT AUTH CHECK (NO LOGOUT LOOP)
firebase.auth().onAuthStateChanged(function(user) {
    if (user) {

        document.getElementById("userEmail").innerText = user.email;

        const ref = db.collection("users").doc(user.uid);

        ref.get().then(doc => {
            if(doc.exists){
                document.getElementById("balance").innerText =
                "$" + doc.data().balance;
            } else {
                ref.set({balance: 0});
            }
        });

    } else {
        window.location.href = "login.html";
    }
});

// COPY ADDRESS
function copyAddress(){
    let address = document.getElementById("usdtAddress").value;

    navigator.clipboard.writeText(address)
    .then(() => {
        alert("Address copied!");
    });
}

// SELECT PLAN
function selectPlan(amount, profit){
    const user = firebase.auth().currentUser;

    if(user){
        db.collection("users").doc(user.uid).update({
            plan: {
                amount: amount,
                profit: profit
            }
        });

        document.getElementById("planInfo").innerText =
        "Selected Plan: $" + amount + " → $" + profit;
    }
}

// LOGOUT
function logout(){
    firebase.auth().signOut()
    .then(() => {
        window.location.href = "login.html";
    });
}

</script>

</body>
</html>
