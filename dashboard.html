<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<style>
body {
    background:#0b1220;
    color:white;
    text-align:center;
    font-family:Arial;
}
button {
    padding:10px;
    margin:5px;
}
.card {
    background:#1a2333;
    margin:10px;
    padding:15px;
    border-radius:10px;
}
</style>

</head>

<body>

<h1>Dashboard</h1>

<p id="userEmail"></p>
<h2 id="balance">$0</h2>

<div class="card">
<h3>Investment Plans</h3>

<button onclick="selectPlan(400,8000)">$400 → $8000</button>
<button onclick="selectPlan(500,10000)">$500 → $10000</button>
<button onclick="selectPlan(600,12000)">$600 → $12000</button>
<button onclick="selectPlan(700,14000)">$700 → $14000</button>
<button onclick="selectPlan(800,16000)">$800 → $16000</button>

</div>

<div class="card">
<h3>Deposit USDT</h3>
<input value="YOUR_USDT_ADDRESS" readonly id="usdt">
<br><br>
<button onclick="copy()">Copy Address</button>
<p id="planInfo"></p>
</div>

<button onclick="logout()">Logout</button>

<script>

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT",
  storageBucket: "YOUR_PROJECT.appspot.com",
  messagingSenderId: "YOUR_SENDER_ID",
  appId: "YOUR_APP_ID"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

firebase.auth().onAuthStateChanged(user => {
    if(user){
        document.getElementById("userEmail").innerText = user.email;

        db.collection("users").doc(user.uid).get().then(doc => {
            if(doc.exists){
                document.getElementById("balance").innerText =
                "$" + doc.data().balance;
            } else {
                db.collection("users").doc(user.uid).set({
                    balance: 0
                });
            }
        });

    } else {
        window.location.href = "login.html";
    }
});

function selectPlan(amount, profit){
    firebase.auth().onAuthStateChanged(user => {
        db.collection("users").doc(user.uid).update({
            plan: {amount, profit}
        });
    });

    document.getElementById("planInfo").innerText =
    "Selected $" + amount + " → $" + profit;
}

function copy(){
    let text = document.getElementById("usdt").value;
    navigator.clipboard.writeText(text);
    alert("Copied!");
}

function logout(){
    firebase.auth().signOut();
    window.location.href = "login.html";
}

</script>

</body>
</html>
