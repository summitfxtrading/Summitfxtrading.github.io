<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

<style>
body {
    margin:0;
    font-family: 'Segoe UI', Arial;
    background: linear-gradient(180deg,#0b1220,#05080f);
    color:white;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* CARD */
.container {
    width:90%;
    max-width:400px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    padding:30px;
    border-radius:16px;
    border:1px solid rgba(255,255,255,0.1);
    text-align:center;
}

/* TITLE */
h2 {
    margin-bottom:20px;
    color:#00ffcc;
}

/* INPUTS */
input {
    width:100%;
    padding:14px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    background:#111827;
    color:white;
    outline:none;
}

/* BUTTON */
button {
    width:100%;
    padding:14px;
    margin-top:15px;
    border:none;
    border-radius:10px;
    background:linear-gradient(45deg,#00ffcc,#0099ff);
    color:black;
    font-weight:bold;
    cursor:pointer;
}

/* FOOTER TEXT */
p {
    margin-top:15px;
    font-size:14px;
    opacity:0.7;
}

a {
    color:#00ffcc;
    text-decoration:none;
}
</style>

</head>

<body>

<div class="container">

    <h2>Create Account</h2>

    <input id="email" type="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <button onclick="register()">Register</button>

    <p>Already have an account? <a href="login.html">Login</a></p>

</div>

<script>

// FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyAT-Yr_wusE2KKW7YpEfQpQMeJYe2WqWW0",
  authDomain: "summitfx-trading.firebaseapp.com",
  projectId: "summitfx-trading",
  storageBucket: "summitfx-trading.firebasestorage.app",
  messagingSenderId: "838670474162",
  appId: "1:838670474162:web:b3d9eac185a7932a20a2ab",
  measurementId: "G-HKLYNSZFT1"
};

// INIT
firebase.initializeApp(firebaseConfig);

// REGISTER FUNCTION
function register(){

    let emailVal = document.getElementById("email").value;
    let passwordVal = document.getElementById("password").value;

    if(!emailVal || !passwordVal){
        alert("Please fill all fields");
        return;
    }

    firebase.auth().createUserWithEmailAndPassword(emailVal, passwordVal)
    .then((userCredential) => {

        let user = userCredential.user;

        // ✅ SEND VERIFICATION EMAIL (THIS IS THE FIX)
        user.sendEmailVerification()
        .then(() => {
            alert("Account created! Verification link sent to your email.");
            window.location = "login.html";
        });

    })
    .catch(error => {
        alert(error.message);
    });
}

</script>

</body>
</html>
