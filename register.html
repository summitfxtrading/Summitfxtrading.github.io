<!DOCTYPE html>
<html>
<head>
<title>Register</title>

<!-- Firebase Scripts -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

</head>

<body style="text-align:center;">

<h2>Create Account</h2>

<input id="email" placeholder="Email"><br><br>
<input id="password" type="password" placeholder="Password"><br><br>

<button onclick="register()">Register</button>

<script>

// YOUR FIREBASE CONFIG (you already have it)
const firebaseConfig = {
  apiKey: "AIzaSyAT-Yr_wusE2KKW7YpEfQpQMeJYe2WqWW0",
  authDomain: "summitfx-trading.firebaseapp.com",
  projectId: "summitfx-trading",
  storageBucket: "summitfx-trading.firebasestorage.app",
  messagingSenderId: "838670474162",
  appId: "1:838670474162:web:b3d9eac185a7932a20a2ab",
  measurementId: "G-HKLYNSZFT1"
};

// Initialize Firebase
firebase.initializeApp(firebaseConfig);

// REGISTER FUNCTION
function register(){
    firebase.auth().createUserWithEmailAndPassword(
        email.value,
        password.value
    )
    .then(() => {
        alert("Account created successfully!");
    })
    .catch(error => {
        alert(error.message);
    });
}

</script>

</body>
</html>
