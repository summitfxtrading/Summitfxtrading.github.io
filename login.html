<!DOCTYPE html>
<html>
<head>
<title>SummitFX Login</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0b1220, #111a2e);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* LOGIN BOX */
.container {
    width: 90%;
    max-width: 420px;
    background: #1a2333;
    padding: 40px;
    border-radius: 15px;
    text-align: center;
    box-shadow: 0 0 25px rgba(0,0,0,0.6);
}

/* TITLE */
h2 {
    color: #00ffcc;
    font-size: 28px;
    margin-bottom: 10px;
}

p {
    color: #aaa;
    font-size: 14px;
}

/* INPUTS */
input {
    width: 100%;
    padding: 15px;
    margin: 12px 0;
    border: none;
    border-radius: 8px;
    background: #0b1220;
    color: white;
    font-size: 16px;
}

/* BUTTON */
button {
    width: 100%;
    padding: 15px;
    margin-top: 15px;
    border: none;
    border-radius: 8px;
    background: linear-gradient(45deg, #00ffcc, #0099ff);
    color: black;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
}

button:hover {
    opacity: 0.9;
}

/* FOOTER TEXT */
.footer {
    margin-top: 15px;
    font-size: 13px;
    color: #888;
}
</style>

</head>

<body>

<div class="container">

    <h2>SummitFX</h2>
    <p>Forex Trading Investment Platform</p>

    <input id="email" placeholder="Email" type="email">
    <input id="password" placeholder="Password" type="password">

    <button onclick="login()">Login</button>

    <div class="footer">
        Trade smart. Invest with confidence.
    </div>

</div>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyAT-Yr_wusE2KKW7YpEfQpQMeJYe2WqWW0",
  authDomain: "summitfx-trading.firebaseapp.com",
  projectId: "summitfx-trading",
  storageBucket: "summitfx-trading.firebasestorage.app",
  messagingSenderId: "838670474162",
  appId: "1:838670474162:web:b3d9eac185a7932a20a2ab",
  measurementId: "G-HKLYNSZFT1"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// LOGIN FUNCTION (FIXED ONLY HERE)
function login(){

    let emailVal = document.getElementById("email").value;
    let passwordVal = document.getElementById("password").value;

    firebase.auth().signInWithEmailAndPassword(
        emailVal,
        passwordVal
    )
    .then(async (userCredential) => {

        let user = userCredential.user;

        let doc = await db.collection("users").doc(user.uid).get();

        if(doc.exists && doc.data().isAdmin === true){
            window.location.href = "admin.html";
        } else {
            window.location.href = "dashboard.html";
        }

    })
    .catch(error => {
        alert(error.message);
    });
}

</script>

</body>
</html>
