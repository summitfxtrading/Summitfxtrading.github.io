<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

</head>

<body style="text-align:center;">

<h2>Login</h2>

<input id="email" placeholder="Email"><br><br>
<input id="password" type="password"><br><br>

<button onclick="login()">Login</button>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyAT-Yr_wusE2KKW7YpEfQpQMeJYe2WqWW0",
  authDomain: "summitfx-trading.firebaseapp.com",
  projectId: "summitfx-trading",
  storageBucket: "summitfx-trading.firebasestorage.app",
  messagingSenderId: "838670474162",
  appId: "1:838670474162:web:b3d9eac185a7932a20a2ab",
  measurementId: "G-HKLYNSZFT1"
};

firebase.initializeApp(firebaseConfig);

// LOGIN FUNCTION
function login(){
    firebase.auth().signInWithEmailAndPassword(
        email.value,
        password.value
    )
    .then(() => {
        alert("Login successful!");
        window.location.href = "dashboard.html";
    })
    .catch(error => {
        alert(error.message);
    });
}

</script>

</body>
</html>
